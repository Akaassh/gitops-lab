---
# monitoring/tasks/main.yml

# ── Prometheus ──────────────────────────────────────────────
- name: Create Prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
  become: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  become: true

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
  become: true

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes
  become: true

- name: Copy Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-2.51.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: yes
  loop:
    - prometheus
    - promtool
  become: true

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
  become: true
  notify: Restart Prometheus

- name: Create Prometheus systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Prometheus Monitoring
      After=network.target

      [Service]
      User=prometheus
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --web.console.libraries=/etc/prometheus/console_libraries \
        --web.console.templates=/etc/prometheus/consoles
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service
  become: true
  notify: Restart Prometheus

- name: Enable and start Prometheus
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: yes
  become: true

# ── Grafana ──────────────────────────────────────────────────
- name: Add Grafana apt repository key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.asc
  become: true

- name: Add Grafana repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    state: present
  become: true

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: yes
  become: true

- name: Enable and start Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
  become: true

- name: Allow Prometheus port through firewall
  community.general.ufw:
    rule: allow
    port: "9090"
    proto: tcp
  become: true

- name: Allow Grafana port through firewall
  community.general.ufw:
    rule: allow
    port: "3000"
    proto: tcp
  become: true
